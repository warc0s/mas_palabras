name: Bug report
description: Report a reproducible problem in Mas Palabras.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a problem. Please avoid sharing private vocabulary or secrets in public issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that reproduces the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, pnpm version, and browser when relevant.
    validations:
      required: false
