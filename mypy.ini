[mypy]
python_version = 3.11
warn_unused_ignores = True
warn_return_any = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
strict_optional = True
ignore_missing_imports = True
follow_imports = skip
files = app.py, blueprints/quiz.py, blueprints/words.py, blueprints/settings.py, utils/database.py, utils/logging_config.py
