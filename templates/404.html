{% extends "base.html" %}

{% block title %}Página no encontrada{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto text-center py-16">
    <i class="fas fa-search text-6xl text-gray-300 mb-6"></i>
    <h1 class="text-4xl font-bold text-gray-800 mb-4">404 - Página no encontrada</h1>
    <p class="text-gray-600 mb-8">No pudimos encontrar la página que buscas. Revisa la dirección o regresa al inicio.</p>
    <a href="{{ url_for('words.index') }}" class="inline-flex items-center bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors duration-200">
        <i class="fas fa-arrow-left mr-2"></i>Volver al inicio
    </a>
</div>
{% endblock %}
