{% extends "base.html" %}

{% block title %}Error del servidor{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto text-center py-16">
    <i class="fas fa-exclamation-triangle text-6xl text-red-300 mb-6"></i>
    <h1 class="text-4xl font-bold text-gray-800 mb-4">500 - Error interno del servidor</h1>
    <p class="text-gray-600 mb-8">Ocurrió un problema inesperado al procesar tu solicitud. Hemos registrado el fallo.</p>
    <a href="{{ url_for('words.index') }}" class="inline-flex items-center bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors duration-200">
        <i class="fas fa-arrow-left mr-2"></i>Volver al inicio
    </a>
</div>
{% endblock %}
