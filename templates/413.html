{% extends "base.html" %}

{% block title %}Archivo demasiado grande{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto text-center py-16">
    <i class="fas fa-file-upload text-6xl text-orange-300 mb-6"></i>
    <h1 class="text-4xl font-bold text-gray-800 mb-4">413 - Archivo demasiado grande</h1>
    <p class="text-gray-600 mb-8">El archivo que intentaste subir supera el tamaño permitido. Reduce el tamaño o contacta al administrador.</p>
    <a href="{{ request.referrer or url_for('words.index') }}" class="inline-flex items-center bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors duration-200">
        <i class="fas fa-arrow-left mr-2"></i>Regresar
    </a>
</div>
{% endblock %}
